<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login MPB</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <div class="page-center">

        <div class="form-container">

            
            <h2>Login <span class="text-highlight">MPB</span></h2>

            <form id="formLogin">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>

                <div style="margin-top: 8px;">
                    <input type="checkbox" id="mostrarSenha">
                    <label for="mostrarSenha">Mostrar senha</label>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">Entrar</button>
            </form>

            <div class="form-footer">
                Não tem conta? <a href="index.html">Cadastre-se</a>
            </div>
            
        </div>
    </div>

    <script>

    const form = document.getElementById('formLogin');

    const campoSenha =
        document.getElementById('senha');

    const checkbox =
        document.getElementById('mostrarSenha');

    checkbox.addEventListener('change', () => {

        if (checkbox.checked) {

            campoSenha.type = 'text';

        } else {

            campoSenha.type = 'password';

        }

    });
    
   form.addEventListener('submit', function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        fetch('http://localhost:3000/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, senha })
        })
        .then(res => {
            // Se o servidor responder com erro (ex: 400 ou 401), joga para o catch tratar
            if (!res.ok) {
                return res.json().then(errData => { throw errData; });
            }
            return res.json();
        })
        .then(data => {
            // Se chegou aqui, deu sucesso! Guardamos os dados e vamos para a home
            localStorage.setItem(
                'usuarioLogado',
                JSON.stringify(data)
            );
            window.location.href = 'home.html';
        })
        .catch(err => {
            console.error(err);
            // Mostra o erro exato do seu backend ("Senha incorreta" ou "Usuário não encontrado")
            if (err && err.erro) {
                alert(err.erro);
            } else {
                alert('Erro ao conectar com o servidor');
            }
        });
    });

    </script>
</body>
</html>
