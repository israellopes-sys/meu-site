<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum MPB</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="header">
        <div class="btn-group">
            <a href="javascript:history.back()" class="btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>
            <h1>Tópicos de Discussão</h1>
        </div>

        <button class="btn-primary" onclick="alert('Funcionalidade em desenvolvimento!')">
            + Novo Tópico
        </button>
    </div>

    <h2>Comentários</h2>

    <div id="lista-comentarios"></div>
    
    <br></br>

    <textarea id="novoComentario" placeholder="Digite seu comentário"></textarea>

    <button class="btn-primary" onclick="enviarComentario()">
        Enviar Comentário
    </button>

</div>


<script>

const params = new URLSearchParams(window.location.search);
const idMusica = params.get('id');

fetch(`http://localhost:3000/comentarios/${idMusica}`)
    .then(res => res.json())
    .then(comentarios => {

        const lista = document.getElementById('lista-comentarios');

        comentarios.forEach(comentario => {

            lista.innerHTML += `
                <div class="topic-card">
                    <p>${comentario.texto}</p>
                    <small>${comentario.data_comentario}</small>
                </div>
            `;

        });

    })
    .catch(err => {
        console.error(err);
    });

function enviarComentario() {

    const texto =
        document.getElementById('novoComentario').value;

    fetch('http://localhost:3000/comentarios', {

        method: 'POST',

        headers: {
            'Content-Type': 'application/json'
        },

        body: JSON.stringify({

            texto: texto,
            id_usuario: 1,
            id_musica: idMusica

        })
    })

    .then(res => res.json())

    .then(data => {

        alert('Comentário enviado!');

        location.reload();

    })

    .catch(err => {

        console.error(err);

    });
}
</script>

</body>
</html>
