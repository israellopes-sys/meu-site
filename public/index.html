<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MPB Interativa</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-black text-white">

    <!-- FORMULÁRIO -->
    <div class="flex justify-center items-center min-h-screen">
        <div class="w-full max-w-md bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700">
            <h1 class="text-3xl font-extrabold text-center mb-6">
                Crie Sua Conta <span class="text-blue-500">MPB</span>
            </h1>


            <form id="formCadastro">
                <div class="mb-4">
                     <label>Nome Completo</label>
                     <input id="nome" type="text" class="w-full p-3 rounded-lg bg-gray-900 text-white border border-gray-700">
                 </div>

                 <div class="mb-6">
                      <label>Email</label>
                     <input id="email" type="email" class="w-full p-3 rounded-lg bg-gray-900 text-white border border-gray-700">
                </div>

                 <div class="mb-6">
                    <label>Senha</label>

                    <input
                        id="senha"
                        type="password"
                        minlength="6"
                        required
                        class="w-full p-3 rounded-lg bg-gray-900 text-white border border-gray-700">

                    <div class="mt-2">
                        <input type="checkbox" id="mostrarSenha">
                        <label for="mostrarSenha">Mostrar senha</label>
                    </div>
                </div>

                 <button type="submit"
                     class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg">
                      Cadastrar
                  </button>

            </form>

            <p class="text-center text-gray-400 mt-4 text-sm">
                Já tem conta? <a href="login.html" class="text-blue-500">Faça Login</a>
            </p>
        </div>
    </div>


   

    <!-- SCRIPT -->
    <script src="js/main.js"></script>

    <script>


    const campoSenha =
        document.getElementById('senha');
    

    const checkbox =
        document.getElementById('mostrarSenha');

    checkbox.addEventListener('change', () => {

        if (checkbox.checked) {

            campoSenha.type = 'text';

        } else {

            campoSenha.type = 'password';

        }

    });
    const formCadastroPage = document.getElementById('formCadastro'); // Certifique-se de que seu <form> tem esse id="formCadastro"

    form.addEventListener('submit', function(e) {
        e.preventDefault(); // Impede a página de atualizar sozinha

        // 1. Pega os valores que o usuário digitou
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        if (senha.length < 6) {

            alert('A senha deve possuir pelo menos 6 caracteres.');

            return;

        }

        // 2. Envia os dados para o seu back-end (ajuste a URL se a sua rota for diferente)
        fetch('http://localhost:3000/usuarios', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                nome: nome,
                email: email,
                senha: senha
            })
        })
        .then(res => {
            if (res.ok) {
                alert('Conta criada com sucesso! Faça seu login.');
                window.location.href = 'login.html'; // 3. Redireciona para o login
            } else {
                alert('Erro ao criar conta. Verifique os dados ou tente outro e-mail.');
            }
        })
        .catch(err => {
            console.error('Erro na requisição:', err);
            alert('Não foi possível conectar ao servidor.');
        });
    });
    </script>

</body>
</html>
