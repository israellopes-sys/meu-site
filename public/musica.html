<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player MPB</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="page-center">

        <div class="player-card">
            <div class="back-nav" onclick="window.location.href='home.html'">
                <i class="fa-solid fa-arrow-left"></i> Sair
            </div>

            <div class="album-art">
                <i class="fa-solid fa-compact-disc fa-spin fa-4x"></i>
            </div>

            <div class="song-title" id="titulo"></div>

            <div class="artist-name" id="artista"></div>

            <div class="controls">
                <button onclick="togglePlay()" class="btn-play">
                    <i class="fa-solid fa-play" id="playIcon"></i>
                </button>
            </div>

            <div class="action-buttons">
                <button onclick="toggleLike(this)" class="pill-btn">
                    <i class="fa-solid fa-heart"></i> Curtir
                </button>

            <button onclick="window.location.href='comentarios.html?id=' + window.idMusica" class="pill-btn">
                    <i class="fa-solid fa-comment"></i> Comentários
                </button>
            </div>
        </div>
    </div>

<script>
// Captura os parâmetros da URL para saber qual música carregar
const params = new URLSearchParams(window.location.search);
window.idMusica = params.get('id');

// Se não houver ID na URL, volta para a home para não bugar o layout
if (!window.idMusica) {
    alert("Nenhuma música foi selecionada!");
    window.location.href = 'home.html';
}

// 1. CARREGAR OS DADOS DA MÚSICA SELECIONADA (READ)
async function carregarDetalhesMusica() {
    try {
        const resposta = await fetch(`http://localhost:3000/musicas/${window.idMusica}`);
        
        if (!resposta.ok) {
            throw new Error("Música não encontrada no banco de dados.");
        }
        
        const musica = await resposta.json();

        // Injeta os dados dinamicamente nas tags HTML
        document.getElementById('titulo').textContent = musica.titulo;
        document.getElementById('artista').textContent = musica.artista;
    } catch (err) {
        console.error("Erro ao buscar detalhes da música:", err);
        document.getElementById('titulo').textContent = "Erro ao carregar";
        document.getElementById('artista').textContent = "Música não encontrada";
    }
}

// Executa a função assim que a página termina de carregar
document.addEventListener("DOMContentLoaded", carregarDetalhesMusica);

// Funções auxiliares para os botões da interface (Player simulado/Front-end)
let tocando = false;
function togglePlay() {
    tocando = !tocando;
    const icone = document.getElementById('playIcon');
    const disco = document.querySelector('.album-art i');
    
    if (tocando) {
        icone.className = "fa-solid fa-pause";
        disco.classList.add('fa-spin'); // Faz o disco girar
    } else {
        icone.className = "fa-solid fa-play";
        disco.classList.remove('fa-spin'); // Pausa o giro do disco
    }
}

function toggleLike(botao) {
    botao.classList.toggle('liked');
    // Aqui você pode integrar com o fetch para a rota POST /curtidas no futuro se desejar!
    if (botao.classList.contains('liked')) {
        botao.innerHTML = '<i class="fa-solid fa-heart text-red-500"></i> Curtido';
    } else {
        botao.innerHTML = '<i class="fa-solid fa-heart"></i> Curtir';
    }
}
</script>

<script src="js/script.js"></script>
</body>
</html>
