<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MPB Interativa</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-black text-white">

    <!-- FORMULÁRIO -->
    <div class="flex justify-center items-center min-h-screen">
        <div class="w-full max-w-md bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700">
            <h1 class="text-3xl font-extrabold text-center mb-6">
                Crie Sua Conta <span class="text-blue-500">MPB</span>
            </h1>

            <form>
                <div class="mb-4">
                    <label class="block text-sm text-gray-300 mb-1">Nome Completo</label>
                    <input type="text" placeholder="Seu nome" class="w-full p-3 rounded-lg bg-gray-900 text-white border border-gray-700">
                </div>

                <div class="mb-6">
                    <label class="block text-sm text-gray-300 mb-1">Email</label>
                    <input type="email" placeholder="seu@email.com" class="w-full p-3 rounded-lg bg-gray-900 text-white border border-gray-700">
                </div>

                <button type="button" onclick="window.location.href='tela2.html'"
                    class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg">
                    Cadastrar
                </button>
            </form>

            <p class="text-center text-gray-400 mt-4 text-sm">
                Já tem conta? <a href="tela2.html" class="text-blue-500">Faça Login</a>
            </p>
        </div>
    </div>

    <!-- CATÁLOGO DINÂMICO -->
    <div class="container mt-5">
        <h2 class="text-center mb-4">Catálogo de Músicas</h2>
        <div id="cards-container" class="row g-4"></div>
    </div>

    <!-- SCRIPT -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
